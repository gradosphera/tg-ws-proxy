name: Build and Release

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create a release'
        required: true
        default: 'false'
      version:
        description: 'Release tag (e.g., v1.2.3)'
        required: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies & pyinstaller
        run: |
          pip install . "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Strip Rich PE header
        shell: bash
        run: |
          python -c "
          import struct, pathlib
          exe = pathlib.Path('dist/TgWsProxy.exe')
          data = bytearray(exe.read_bytes())
          rich = data.find(b'Rich')
          if rich == -1:
              raise SystemExit('Rich header not found')
          ck = struct.unpack_from('<I', data, rich + 4)[0]
          dans = struct.pack('<I', 0x536E6144 ^ ck)
          ds = data.find(dans)
          if ds == -1:
              raise SystemExit('DanS marker not found')
          data[ds:rich + 8] = b'\x00' * (rich + 8 - ds)
          exe.write_bytes(data)
          print(f'Stripped Rich header: offset {ds}..{rich+8}')
          "

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy_windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy
          path: dist/TgWsProxy_windows.exe

  build-win7:
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            suffix: 64bit
          - arch: x86
            suffix: 32bit
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.8"
          architecture: ${{ matrix.arch }}
          cache: pip

      - name: Install dependencies & pyinstaller
        run: |
          pip install . "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller
        run: pyinstaller packaging/windows.spec --noconfirm

      - name: Rename artifact
        run: mv dist/TgWsProxy.exe dist/TgWsProxy_windows_7_${{ matrix.suffix }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy
          path: dist/TgWsProxy_windows_7_${{ matrix.suffix }}.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies & pyinstaller
        run: |
          pip install . "pyinstaller==5.13.2"

      - name: Build app with PyInstaller
        run: python3.12 -m PyInstaller packaging/macos.spec --noconfirm

      - name: Validate universal2 app bundle
        run: |
          set -euo pipefail
          found=0
          while IFS= read -r -d '' file; do
            if file "$file" | grep -q "Mach-O"; then
              found=1
              archs="$(lipo -archs "$file" 2>/dev/null || true)"
              case "$archs" in
                *arm64*x86_64*|*x86_64*arm64*) ;;
                *)
                  echo "Missing universal2 slices in $file: ${archs:-unknown}" >&2
                  exit 1
                  ;;
              esac
            fi
          done < <(find "dist/TG WS Proxy.app" -type f -print0)

          if [ "$found" -eq 0 ]; then
            echo "No Mach-O files found in app bundle" >&2
            exit 1
          fi

      - name: Create DMG
        run: |
          set -euo pipefail
          APP_NAME="TG WS Proxy"
          DMG_TEMP="dist/dmg_temp"

          rm -rf "$DMG_TEMP"
          mkdir -p "$DMG_TEMP"
          cp -R "dist/${APP_NAME}.app" "$DMG_TEMP/"
          ln -s /Applications "$DMG_TEMP/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_TEMP" \
            -ov \
            -format UDZO \
            "dist/TgWsProxy_macos_universal.dmg"

          rm -rf "$DMG_TEMP"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy-macOS
          path: dist/TgWsProxy_macos_universal.dmg

  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64, riscv64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies & pyinstaller
        run: |
          pip install . "pyinstaller==5.13.2"

      - name: Build EXE with PyInstaller
        env:
          TARGET_ARCH: ${{ matrix.arch }}
        run: |
          # The spec file should be named according to the target architecture.
          SPEC_FILE="packaging/linux_${{ matrix.arch }}.spec"
          if [ ! -f "$SPEC_FILE" ]; then
            echo "Spec file $SPEC_FILE not found, falling back to generic linux.spec"
            SPEC_FILE="packaging/linux.spec"
          fi
          pyinstaller "$SPEC_FILE" --noconfirm

      - name: Rename artifact
        run: |
          mv dist/TgWsProxy dist/TgWsProxy_linux_${{ matrix.arch }}
          # If a .deb package is produced, rename it accordingly
          if [ -f "dist/TgWsProxy.deb" ]; then
            mv dist/TgWsProxy.deb dist/TgWsProxy_linux_${{ matrix.arch }}.deb
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: TgWsProxy-linux
          path: |
            dist/TgWsProxy_linux_${{ matrix.arch }}
            dist/TgWsProxy_linux_${{ matrix.arch }}.deb

  release:
    needs: [build-windows, build-win7, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.make_release == 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: TgWsProxy*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: "TG WS Proxy ${{ github.event.inputs.version }}"
          body: |
            ## 
            ### [❤️ Поддержать развитие проекта](https://github.com/Flowseal/tg-ws-proxy/blob/main/docs/Funding.md)
          files: |
            dist/TgWsProxy_windows.exe
            dist/TgWsProxy_windows_7_64bit.exe
            dist/TgWsProxy_windows_7_32bit.exe
            dist/TgWsProxy_macos_universal.dmg
            dist/TgWsProxy_linux_amd64
            dist/TgWsProxy_linux_amd64.deb
            dist/TgWsProxy_linux_arm64
            dist/TgWsProxy_linux_arm64.deb
            dist/TgWsProxy_linux_riscv64
            dist/TgWsProxy_linux_riscv64.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
